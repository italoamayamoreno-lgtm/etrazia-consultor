<style>
  :root {
    --black: #0B1120; --gray-1: #111827; --gray-2: #1A2235; --gray-3: #243044;
    --gray-5: #94A3B8; --gray-6: #CBD5E1;
    --copper: #B87333; --amber: #D97706; --ice: #F8FAFC; --green: #4CAF7D;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--black);color:var(--ice);font-family:'Inter',sans-serif;font-weight:300;min-height:100vh;}
  h1,h2,h3{font-family:'Montserrat',sans-serif;}

  nav{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;background:rgba(17,24,39,0.85);border-bottom:0.5px solid rgba(184,115,51,0.15);}
  .nav-logo{display:flex;align-items:center;gap:10px;}
  .nav-logo svg{width:30px;height:30px;}
  .nav-title b{font-family:'Montserrat',sans-serif;font-weight:800;font-size:15px;letter-spacing:0.04em;}
  .nav-title b span{color:var(--amber);font-weight:400;}
  .nav-sub{font-size:9px;letter-spacing:0.16em;color:var(--gray-5);text-transform:uppercase;display:block;}
  #logout-btn{background:transparent;border:0.5px solid var(--gray-3);color:var(--gray-5);border-radius:8px;padding:8px 16px;font-size:13px;cursor:pointer;font-family:'Inter',sans-serif;}
  #logout-btn:hover{border-color:var(--copper);color:var(--amber);}

  main{max-width:840px;margin:0 auto;padding:32px 20px;}

  /* LOGIN */
  #login-view{display:flex;align-items:center;justify-content:center;min-height:80vh;}
  #login-box{background:var(--gray-1);border:0.5px solid var(--gray-3);border-radius:16px;padding:36px;width:100%;max-width:360px;}
  #login-box h2{font-size:18px;margin-bottom:16px;text-align:center;}
  #login-box input{width:100%;background:var(--gray-2);border:0.5px solid var(--gray-3);border-radius:10px;padding:11px 14px;color:var(--ice);font-family:'Inter',sans-serif;font-size:14px;margin-bottom:10px;outline:none;}
  #login-box input:focus{border-color:var(--copper);}
  #login-box button{width:100%;background:linear-gradient(135deg,var(--copper),var(--amber));color:#1a1206;border:none;border-radius:10px;padding:12px;font-size:14px;font-weight:600;cursor:pointer;margin-top:6px;}
  #login-error{color:#f87171;font-size:12px;margin-top:10px;text-align:center;min-height:16px;}

  /* LIST */
  #app-view{display:none;}
  .empty-state{text-align:center;color:var(--gray-5);padding:60px 20px;font-size:14px;}
  .conv-card{background:var(--gray-1);border:0.5px solid var(--gray-3);border-radius:14px;padding:18px 20px;margin-bottom:14px;}
  .conv-meta{background:var(--gray-2);border-radius:10px;padding:10px 14px;margin-bottom:12px;}
  .conv-meta-row{display:flex;justify-content:space-between;gap:10px;font-size:13px;padding:3px 0;}
  .conv-meta-label{color:var(--gray-5);}
  .badge-done{background:rgba(76,175,125,0.15);border-color:rgba(76,175,125,0.4);color:var(--green);}
  .badge-progress{background:rgba(217,119,6,0.12);border-color:rgba(217,119,6,0.4);color:var(--amber);}
  .conv-header{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px;flex-wrap:wrap;gap:6px;}
  .conv-date{font-size:13px;color:var(--gray-5);}
  .conv-id{font-size:11px;color:var(--gray-3);font-family:monospace;}
  .conv-preview{font-size:13px;color:var(--gray-6);line-height:1.5;margin-bottom:12px;max-height:60px;overflow:hidden;}
  .conv-actions{display:flex;gap:8px;flex-wrap:wrap;}
  .btn{background:var(--gray-2);border:0.5px solid var(--gray-3);color:var(--ice);border-radius:8px;padding:8px 14px;font-size:12px;cursor:pointer;font-family:'Inter',sans-serif;transition:all 0.15s;text-decoration:none;display:inline-flex;align-items:center;gap:6px;}
  .btn:hover{border-color:var(--copper);color:var(--amber);}
  .btn-primary{background:linear-gradient(135deg,var(--copper),var(--amber));color:#1a1206;border:none;}
  .badge{font-size:11px;background:var(--gray-2);border:0.5px solid var(--gray-3);border-radius:99px;padding:3px 10px;color:var(--gray-5);}
  #loading{text-align:center;color:var(--gray-5);padding:40px;font-size:13px;}

  /* FILTER */
  #filter-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:24px;}
  .filter-btn{background:var(--gray-2);border:0.5px solid var(--gray-3);color:var(--gray-5);border-radius:99px;padding:7px 16px;font-size:12px;cursor:pointer;font-family:'Inter',sans-serif;transition:all 0.15s;}
  .filter-btn:hover{border-color:var(--copper);color:var(--amber);}
  .filter-btn.active{background:var(--copper-dim, rgba(184,115,51,0.15));border-color:var(--copper);color:var(--amber);}
  .badge-industria{font-size:11px;background:rgba(184,115,51,0.12);border:0.5px solid rgba(184,115,51,0.3);border-radius:99px;padding:3px 10px;color:var(--amber);}
</style>

<script>
// ===================== CONFIGURACIÓN — debe ser EXACTAMENTE el mismo firebaseConfig que consultor.html =====================
const firebaseConfig = {
  apiKey: "AIzaSyBl7BjWPh8id3mKjoQPSK67y_Q8Oe_Wmns",
  authDomain: "etrazia-consultor.firebaseapp.com",
  projectId: "etrazia-consultor",
  storageBucket: "etrazia-consultor.firebasestorage.app",
  messagingSenderId: "1041562210615",
  appId: "1:1041562210615:web:c7186ed83bb556c8aa0ab2"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();
// ===========================================================================================================================

auth.onAuthStateChanged(user => {
  if (user) {
    document.getElementById('login-view').style.display = 'none';
    document.getElementById('app-view').style.display = 'block';
    document.getElementById('logout-btn').style.display = 'inline-block';
    loadConversations();
  } else {
    document.getElementById('login-view').style.display = 'flex';
    document.getElementById('app-view').style.display = 'none';
    document.getElementById('logout-btn').style.display = 'none';
  }
});

function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  const errorBox = document.getElementById('login-error');
  errorBox.textContent = '';
  auth.signInWithEmailAndPassword(email, password)
    .catch(err => { errorBox.textContent = 'Correo o contraseña incorrectos.'; console.error(err); });
}

function doLogout() {
  auth.signOut();
}

document.getElementById('login-password').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

// ---- Helpers ----
function formatDate(ts) {
  if (!ts) return 'Fecha desconocida';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  return d.toLocaleString('es-PE', { dateStyle: 'medium', timeStyle: 'short' });
}

function extractPreview(brief) {
  if (!brief) return 'Brief aún no disponible.';
  const match = brief.match(/## RESUMEN EJECUTIVO\s*\n([\s\S]*?)(\n##|$)/);
  const text = match ? match[1] : brief;
  return text.replace(/[-*#]\s*/g, '').replace(/\n+/g, ' ').trim().slice(0, 220);
}

function downloadText(filename, content) {
  const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function downloadBriefAsPDF(brief, meta, dateLabel) {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit: 'mm', format: 'a4' });

  const C  = [184, 115, 51];   // copper
  const A  = [217, 119,  6];   // amber
  const DK = [17,  24,  39];   // dark navy
  const GR = [100, 116, 139];  // gray
  const W  = [255, 255, 255];
  const BG = [248, 250, 252];  // ice
  const LG = [243, 244, 246];  // light gray
  const pageW = 210;
  const M = 18;
  const CW = pageW - M * 2;
  let y = 0;
  let currentPage = 1;

  function addFooters(total) {
    for (let p = 1; p <= total; p++) {
      doc.setPage(p);
      if (p > 1) {
        doc.setFillColor(...LG);
        doc.rect(0, 286, pageW, 11, 'F');
        doc.setDrawColor(...C);
        doc.setLineWidth(0.3);
        doc.line(M, 286, pageW - M, 286);
        doc.setFont('helvetica', 'normal');
        doc.setFontSize(7);
        doc.setTextColor(...GR);
        doc.text('EtraziApp — Documento de uso interno', M, 292);
        doc.text('Pagina ' + p + ' de ' + total, pageW - M, 292, { align: 'right' });
      }
    }
  }

  function checkPage(needed) {
    if (y + (needed || 8) > 280) {
      doc.addPage();
      currentPage++;
      // running header on page 2+
      doc.setFillColor(...DK);
      doc.rect(0, 0, pageW, 8, 'F');
      doc.setFont('helvetica', 'bold');
      doc.setFontSize(7);
      doc.setTextColor(...W);
      doc.text('ETRAZIAapp — Brief de Levantamiento', M, 5.5);
      doc.text(meta.empresa || '', pageW - M, 5.5, { align: 'right' });
      y = 14;
    }
  }

  function writeText(text, opts) {
    const font   = opts.font   || 'normal';
    const size   = opts.size   || 9;
    const color  = opts.color  || DK;
    const indent = opts.indent || 0;
    const before = opts.before || 0;
    const after  = opts.after  || 4;
    const bold   = opts.bold   || false;
    const w      = opts.width  || (CW - indent);

    if (before) { checkPage(before + size / 2); y += before; }
    doc.setFont('helvetica', bold ? 'bold' : font);
    doc.setFontSize(size);
    doc.setTextColor(...color);
    const lines = doc.splitTextToSize(text, w);
    lines.forEach((ln, i) => {
      checkPage(size / 2 + 2);
      doc.text(ln, M + indent, y);
      if (i < lines.length - 1) y += size * 0.45;
    });
    y += after;
  }

  // ── COVER PAGE ──────────────────────────────────────────────────────────────
  // dark top band
  doc.setFillColor(...DK);
  doc.rect(0, 0, pageW, 90, 'F');

  // copper accent stripe
  doc.setFillColor(...C);
  doc.rect(0, 90, pageW, 3, 'F');

  // Logo text
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(28);
  doc.setTextColor(...W);
  doc.text('ETRAZIA', M, 38);
  doc.setTextColor(...A);
  doc.text('app', M + doc.getTextWidth('ETRAZIA') + 1, 38);

  doc.setFont('helvetica', 'normal');
  doc.setFontSize(9);
  doc.setTextColor(...C);
  doc.text('powered by Etrazia', M, 45);

  // diamond accent
  const dmx = pageW - M - 12;
  const dmy = 30;
  doc.setFillColor(...A);
  doc.setDrawColor(...A);
  const ds = 10;
  doc.lines([[ds, ds], [ds, -ds], [-ds, -ds], [-ds, ds]], dmx, dmy, [1, 1], 'FD');

  // cover title
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(11);
  doc.setTextColor(...GR);
  doc.text('BRIEF DE LEVANTAMIENTO DE REQUERIMIENTOS', M, 62);

  doc.setFont('helvetica', 'bold');
  doc.setFontSize(18);
  doc.setTextColor(...W);
  doc.text(meta.empresa || 'Cliente', M, 74);

  doc.setFont('helvetica', 'normal');
  doc.setFontSize(9);
  doc.setTextColor(...GR);
  doc.text('Generado por el Asistente de Levantamiento EtraziApp', M, 82);

  // Contact card on cover
  const cy = 102;
  doc.setFillColor(...LG);
  doc.roundedRect(M, cy, CW, 50, 3, 3, 'F');
  doc.setDrawColor(...C);
  doc.setLineWidth(0.4);
  doc.roundedRect(M, cy, CW, 50, 3, 3, 'S');

  doc.setFont('helvetica', 'bold');
  doc.setFontSize(8);
  doc.setTextColor(...C);
  doc.text('DATOS DEL CONTACTO', M + 6, cy + 9);

  const fields = [
    ['Empresa',          meta.empresa || '-'],
    ['Nombres completos', ((meta.nombres || '') + ' ' + (meta.apellidos || '')).trim() || '-'],
    ['DNI',              meta.dni || '-'],
    ['Rol en la empresa', meta.rol || '-'],
    ['Industria',        meta.industria || '-'],
    ['Fecha de sesion',  dateLabel],
  ];
  let fy = cy + 17;
  const col2 = M + 52;
  fields.forEach(([label, val]) => {
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(7.5);
    doc.setTextColor(...GR);
    doc.text(label + ':', M + 6, fy);
    doc.setFont('helvetica', 'normal');
    doc.setTextColor(...DK);
    const wrapped = doc.splitTextToSize(val, CW - 58);
    wrapped.forEach((wl, wi) => { doc.text(wl, col2, fy + wi * 4); });
    fy += 7;
  });

  // cover footer
  doc.setFillColor(...DK);
  doc.rect(0, 265, pageW, 32, 'F');
  doc.setFont('helvetica', 'normal');
  doc.setFontSize(7.5);
  doc.setTextColor(...GR);
  doc.text('Documento de uso interno — EtraziApp', M, 278);
  doc.text('www.etraziapp.com', pageW - M, 278, { align: 'right' });

  // ── CONTENT PAGES ────────────────────────────────────────────────────────────
  doc.addPage();
  currentPage = 2;
  // page 2 header
  doc.setFillColor(...DK);
  doc.rect(0, 0, pageW, 8, 'F');
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(7);
  doc.setTextColor(...W);
  doc.text('ETRAZIAapp — Brief de Levantamiento', M, 5.5);
  doc.text(meta.empresa || '', pageW - M, 5.5, { align: 'right' });
  y = 16;

  // parse markdown
  const lines = brief.split('\n');
  for (let i = 0; i < lines.length; i++) {
    const raw = lines[i];
    const line = raw.trim();
    if (!line) { y += 2; continue; }

    if (line.startsWith('## ')) {
      // H2 — major section
      checkPage(16);
      y += 4;
      doc.setFillColor(...DK);
      doc.rect(M, y - 5, CW, 9, 'F');
      doc.setFillColor(...C);
      doc.rect(M, y - 5, 3, 9, 'F');
      doc.setFont('helvetica', 'bold');
      doc.setFontSize(10);
      doc.setTextColor(...W);
      doc.text(line.replace('## ', '').toUpperCase(), M + 6, y + 0.5);
      y += 8;

    } else if (line.startsWith('### SECCION:')) {
      // Section header
      checkPage(14);
      y += 5;
      const title = line.replace('### SECCION:', '').trim();
      doc.setFillColor(...BG);
      doc.setDrawColor(...C);
      doc.setLineWidth(0.4);
      doc.rect(M, y - 5, CW, 8, 'FD');
      doc.setFillColor(...C);
      doc.rect(M, y - 5, 2, 8, 'F');
      doc.setFont('helvetica', 'bold');
      doc.setFontSize(9);
      doc.setTextColor(...C);
      doc.text(title.toUpperCase(), M + 5, y);
      y += 7;

    } else if (line.startsWith('**') && line.includes(':**')) {
      // Bold label line e.g. **Hallazgos:**
      const labelMatch = line.match(/^\*\*(.+?):\*\*\s*(.*)/);
      if (labelMatch) {
        checkPage(8);
        const label = labelMatch[1];
        const rest  = labelMatch[2];
        doc.setFont('helvetica', 'bold');
        doc.setFontSize(8.5);
        doc.setTextColor(...C);
        const lw = doc.getTextWidth(label + ': ');
        doc.text(label + ':', M, y);
        if (rest) {
          doc.setFont('helvetica', 'normal');
          doc.setTextColor(...DK);
          const wrapped = doc.splitTextToSize(rest, CW - lw);
          wrapped.forEach((wl, wi) => {
            checkPage(5);
            doc.text(wl, M + lw, y + wi * 4.5);
          });
          y += wrapped.length * 4.5 + 1;
        } else {
          y += 5;
        }
      }

    } else if (/^\d+\.\s+\*\*/.test(line)) {
      // Numbered list with bold title
      checkPage(12);
      const numMatch = line.match(/^(\d+)\.\s+\*\*(.+?)\*\*\s*(.*)/);
      if (numMatch) {
        const num   = numMatch[1];
        const title = numMatch[2];
        const rest  = numMatch[3];
        y += 3;
        doc.setFillColor(...C);
        doc.circle(M + 3, y - 1.5, 3, 'F');
        doc.setFont('helvetica', 'bold');
        doc.setFontSize(7.5);
        doc.setTextColor(...W);
        doc.text(num, M + 3, y - 0.5, { align: 'center' });
        doc.setFont('helvetica', 'bold');
        doc.setFontSize(9);
        doc.setTextColor(...DK);
        doc.text(title, M + 9, y);
        y += 5;
        if (rest) {
          doc.setFont('helvetica', 'normal');
          doc.setFontSize(8.5);
          doc.setTextColor(...DK);
          const wrapped = doc.splitTextToSize(rest, CW - 9);
          wrapped.forEach(wl => { checkPage(5); doc.text(wl, M + 9, y); y += 4.5; });
        }
        // look ahead for continuation lines
        while (i + 1 < lines.length && lines[i+1].trim() && !lines[i+1].trim().startsWith('#') && !lines[i+1].trim().startsWith('**') && !/^\d+\./.test(lines[i+1].trim())) {
          i++;
          const cont = lines[i].trim().replace(/\*\*(.+?)\*\*/g, '$1');
          doc.setFont('helvetica', 'normal');
          doc.setFontSize(8.5);
          doc.setTextColor(...DK);
          const wrapped = doc.splitTextToSize(cont, CW - 9);
          wrapped.forEach(wl => { checkPage(5); doc.text(wl, M + 9, y); y += 4.5; });
        }
        y += 3;
      }

    } else if (line.startsWith('- ') || line.startsWith('* ')) {
      checkPage(7);
      const text = line.replace(/^[-*]\s*/, '').replace(/\*\*(.+?)\*\*/g, '$1');
      doc.setFillColor(...C);
      doc.circle(M + 2.5, y - 1.5, 1.2, 'F');
      doc.setFont('helvetica', 'normal');
      doc.setFontSize(8.5);
      doc.setTextColor(...DK);
      const wrapped = doc.splitTextToSize(text, CW - 7);
      wrapped.forEach((wl, wi) => { checkPage(5); doc.text(wl, M + 7, y + wi * 4.5); });
      y += wrapped.length * 4.5 + 1;

    } else if (line.startsWith('---')) {
      checkPage(6);
      y += 2;
      doc.setDrawColor(...C);
      doc.setLineWidth(0.2);
      doc.line(M, y, pageW - M, y);
      y += 4;

    } else {
      // normal paragraph
      checkPage(7);
      const text = line.replace(/\*\*(.+?)\*\*/g, '$1');
      doc.setFont('helvetica', 'normal');
      doc.setFontSize(8.5);
      doc.setTextColor(...DK);
      const wrapped = doc.splitTextToSize(text, CW);
      wrapped.forEach((wl, wi) => { checkPage(5); doc.text(wl, M, y + wi * 4.5); });
      y += wrapped.length * 4.5 + 2;
    }
  }

  addFooters(doc.getNumberOfPages());
  const empresa = (meta.empresa || 'brief').replace(/\s+/g, '_').toLowerCase();
  doc.save('brief_' + empresa + '.pdf');
}

function conversationToText(conversationLog, meta, createdAtLabel) {
  let out = `Conversación — ${createdAtLabel}\n`;
  out += `Empresa: ${meta.empresa || '-'}\n`;
  out += `Nombres completos: ${meta.nombres || ''} ${meta.apellidos || ''}\n`;
  out += `DNI: ${meta.dni || '-'}\n`;
  out += `Rol en la empresa: ${meta.rol || '-'}\n`;
  out += `${'='.repeat(40)}\n\n`;
  (conversationLog || []).forEach(m => {
    const who = m.role === 'user' ? 'CLIENTE' : 'ASISTENTE';
    out += `[${who}]\n${m.text}\n`;
    if (m.attachments && m.attachments.length) {
      out += `(Adjuntos: ${m.attachments.join(', ')})\n`;
    }
    out += '\n';
  });
  return out;
}

// ---- Load & render conversations ----
async function loadConversations() {
  const listEl = document.getElementById('conv-list');
  const loadingEl = document.getElementById('loading');
  try {
    const snap = await db.collection('conversaciones').orderBy('createdAt', 'desc').get();
    loadingEl.style.display = 'none';

    if (snap.empty) {
      listEl.innerHTML = '<div class="empty-state">Todavía no hay conversaciones guardadas.</div>';
      return;
    }

    document.getElementById('filter-bar').style.display = 'flex';

    snap.forEach(doc => {
      const data = doc.data();
      const dateLabel = formatDate(data.createdAt);
      const updatedLabel = formatDate(data.updatedAt);
      const isDone = data.status === 'done';
      const statusBadge = isDone
        ? `<span class="badge badge-done">✓ Completado</span>`
        : `<span class="badge badge-progress">● En progreso</span>`;
      const fullName = `${data.nombres || ''} ${data.apellidos || ''}`.trim() || '(sin nombre)';

      const card = document.createElement('div');
      card.className = 'conv-card';
      card.dataset.industria = data.industria || '';
      card.innerHTML = `
        <div class="conv-meta">
          <div class="conv-meta-row"><span class="conv-meta-label">Empresa</span><span>${data.empresa || '-'}</span></div>
          <div class="conv-meta-row"><span class="conv-meta-label">Nombres completos</span><span>${fullName}</span></div>
          <div class="conv-meta-row"><span class="conv-meta-label">DNI</span><span>${data.dni || '-'}</span></div>
          <div class="conv-meta-row"><span class="conv-meta-label">Rol en la empresa</span><span>${data.rol || '-'}</span></div>
          <div class="conv-meta-row"><span class="conv-meta-label">Industria</span><span class="badge-industria">${data.industria || '-'}</span></div>
        </div>
        <div class="conv-header">
          <div class="conv-date">Iniciado: ${dateLabel} &nbsp;·&nbsp; Última actividad: ${updatedLabel}</div>
          <div style="display:flex;gap:6px;align-items:center;">
            ${statusBadge}
            <span class="badge">${(data.attachmentCount || 0)} adjunto(s)</span>
          </div>
        </div>
        <div class="conv-preview">${isDone ? extractPreview(data.brief) : 'Conversación aún en curso — brief no disponible todavía.'}</div>
        <div class="conv-actions">
          <button class="btn btn-primary" data-action="brief" ${isDone ? '' : 'disabled'}>📋 Descargar brief (PDF)</button>
          <button class="btn" data-action="conv">💬 Descargar conversación (.txt)</button>
          <button class="btn" data-action="attachments">📎 Ver adjuntos</button>
        </div>
        <div class="conv-attachments" style="display:none;margin-top:10px;"></div>
      `;

      const briefBtn = card.querySelector('[data-action="brief"]');
      if (isDone) {
        briefBtn.addEventListener('click', () => {
          downloadBriefAsPDF(data.brief || '', data, dateLabel);
        });
      }
      card.querySelector('[data-action="conv"]').addEventListener('click', () => {
        downloadText(`conversacion_${doc.id}.txt`, conversationToText(data.conversationLog, data, dateLabel));
      });
      card.querySelector('[data-action="attachments"]').addEventListener('click', async (e) => {
        const box = card.querySelector('.conv-attachments');
        if (box.style.display === 'block') { box.style.display = 'none'; return; }
        box.style.display = 'block';
        if (box.dataset.loaded) return;
        box.innerHTML = 'Cargando adjuntos...';
        const attSnap = await doc.ref.collection('adjuntos').orderBy('order').get();
        if (attSnap.empty) {
          box.innerHTML = '<span style="color:var(--gray-5);font-size:12px;">Sin adjuntos.</span>';
        } else {
          box.innerHTML = '';
          attSnap.forEach(a => {
            const att = a.data();
            const link = document.createElement('a');
            link.className = 'btn';
            link.href = att.dataUrl;
            link.download = att.name;
            link.textContent = `⬇ ${att.name}`;
            link.style.marginRight = '8px';
            link.style.marginBottom = '6px';
            box.appendChild(link);
          });
        }
        box.dataset.loaded = '1';
      });

      listEl.appendChild(card);
    });
  } catch (err) {
    loadingEl.textContent = 'Error al cargar las conversaciones. Revisa la consola para más detalles.';
    console.error(err);
  }
}

let activeFilter = 'Todos';
function setFilter(value, btn) {
  activeFilter = value;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.conv-card').forEach(card => {
    const industria = card.dataset.industria || '';
    card.style.display = (value === 'Todos' || industria === value) ? 'block' : 'none';
  });
}
